{% extends "base.html" %}
{% block title %}Add Expense{% endblock %}
{% block content %}

<div class="page-header-row" style="margin-bottom:1.5rem">
  <div class="page-header" style="margin-bottom:0">
    <h1>Add Expense</h1>
    <p>{{ event_name }}</p>
  </div>
  <a href="/dashboard" class="btn btn-ghost btn-sm">← Back</a>
</div>

<div style="max-width:540px">
<div class="card">
  <div class="card-body">
    <form method="POST">
      <div class="form-group">
        <label class="form-label">What was paid for?</label>
        <input type="text" name="expense_name" class="form-control" placeholder="Raaj Kachori, Hotel, Petrol…" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Amount</label>
        <div class="input-prefix">
          <span class="prefix-symbol">₹</span>
          <input type="number" step="0.01" min="0" name="amount" class="form-control" placeholder="0.00" required>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Paid by</label>
        <select name="payer" class="form-control" required>
          {% for person in participants %}
          <option value="{{ person }}">{{ person }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label class="form-label">Split among</label>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button type="button" class="btn btn-ghost btn-sm" onclick="selectAll()">Select All</button>
          <button type="button" class="btn btn-ghost btn-sm" onclick="clearAll()">Clear All</button>
        </div>
        <div class="checkbox-grid">
          {% for person in participants %}
          <label class="checkbox-chip checked" id="chip-{{ loop.index }}">
            <input type="checkbox" name="participants" value="{{ person }}" checked
              onchange="syncChip(this,'chip-{{ loop.index }}')">
            {{ person }}
          </label>
          {% endfor %}
        </div>
      </div>
      <hr class="divider">
      <div style="display:flex;gap:10px">
        <button class="btn btn-primary btn-lg" style="flex:1">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
          Save Expense
        </button>
        <a href="/dashboard" class="btn btn-ghost btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>
</div>

<script>
function syncChip(cb,id){
  document.getElementById(id).classList.toggle('checked',cb.checked);
}
function selectAll(){
  document.querySelectorAll('.checkbox-chip').forEach(c=>{
    c.classList.add('checked');c.querySelector('input').checked=true;
  });
}
function clearAll(){
  document.querySelectorAll('.checkbox-chip').forEach(c=>{
    c.classList.remove('checked');c.querySelector('input').checked=false;
  });
}
</script>
{% endblock %}
