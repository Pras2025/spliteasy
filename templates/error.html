<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0f">
<title>Error – SplitEasy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0f;--bg-2:#131316;--bg-3:#1a1a1f;--border:rgba(255,255,255,.08);--ink:#f0f0f4;--ink-2:#a0a0b0;--ink-3:#60606e;--red:#f87171;--red-bg:rgba(248,113,113,.1);--accent:#7c6dff;--accent-2:#9d91ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;padding:2rem;background-image:radial-gradient(ellipse 70% 40% at 50% -5%,rgba(248,113,113,.08),transparent)}
.wrap{max-width:720px;margin:0 auto}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.05rem;font-weight:800;background:linear-gradient(135deg,var(--accent-2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2rem;display:block}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--red-bg);color:var(--red);border:1px solid rgba(248,113,113,.2);padding:5px 12px;border-radius:99px;font-size:.8125rem;font-weight:600;margin-bottom:1rem}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;font-weight:700;margin-bottom:.5rem}
.sub{color:var(--ink-3);font-size:.9rem;margin-bottom:1.5rem}
.error-msg{background:var(--red-bg);border:1px solid rgba(248,113,113,.2);border-radius:10px;padding:1rem 1.25rem;font-size:.875rem;color:var(--red);margin-bottom:1.25rem;word-break:break-word}
.tb-label{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);margin-bottom:.5rem}
.tb{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:1rem;font-family:monospace;font-size:.78rem;color:var(--ink-2);overflow-x:auto;white-space:pre-wrap;word-break:break-word;line-height:1.6;max-height:400px;overflow-y:auto}
.actions{display:flex;gap:10px;margin-top:1.5rem;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:.875rem;font-weight:500;text-decoration:none;cursor:pointer;border:none;font-family:inherit}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff}
.btn-ghost{background:var(--bg-3);color:var(--ink-2);border:1px solid var(--border)}
</style>
</head>
<body>
<div class="wrap">
  <span class="logo">SplitEasy</span>
  <div class="badge">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    500 Internal Server Error
  </div>
  <h1>Something went wrong</h1>
  <p class="sub">The server hit an unexpected error. The details below will help fix it.</p>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  {% if traceback %}
  <div class="tb-label">Full traceback</div>
  <div class="tb">{{ traceback }}</div>
  {% endif %}

  <div class="actions">
    <a href="/" class="btn btn-primary">← Go Home</a>
    <a href="/login" class="btn btn-ghost">Sign In</a>
  </div>
</div>
</body>
</html>
