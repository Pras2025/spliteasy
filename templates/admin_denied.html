<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0d0d0f">
<title>Access Denied – SplitEasy</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0f;--bg-2:#131316;--bg-3:#1a1a1f;--border:rgba(255,255,255,.08);--ink:#f0f0f4;--ink-3:#60606e;--red:#f87171;--accent:#7c6dff;--accent-2:#9d91ff}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center}
.wrap{max-width:320px}
.icon{width:64px;height:64px;border-radius:18px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center}
.icon svg{width:28px;height:28px;stroke:var(--red)}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:.5rem}
p{color:var(--ink-3);font-size:.9rem;line-height:1.6;margin-bottom:1.75rem}
.btn{display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;padding:11px 24px;border-radius:8px;font-size:.9375rem;font-weight:600;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">
    <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h1>Access Denied</h1>
  <p>This page is only accessible to the site administrator.</p>
  <a href="/" class="btn">← Go Home</a>
</div>
</body>
</html>
