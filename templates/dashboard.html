{% extends "base.html" %}
{% block content %}

<div class="page-header-row">
  <div class="page-header" style="margin-bottom:0">
    <h1>{{ event_name }}</h1>
    <p>Event Dashboard</p>
  </div>
  <div class="page-header-actions">
    <a href="/" class="btn btn-ghost btn-sm">← All Events</a>
  </div>
</div>

<div class="stat-grid" style="margin-bottom:1.75rem">
  <div class="stat-card">
    <div class="stat-label">Total Spent</div>
    <div class="stat-value green">₹{{ total_amount }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Participants</div>
    <div class="stat-value accent">{{ participant_count }}</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Expenses</div>
    <div class="stat-value">{{ expense_count }}</div>
  </div>
</div>

<div class="card">
  <div class="card-body" style="padding:1.25rem 1.5rem">
    <p style="font-size:.875rem;color:var(--ink-2);margin-bottom:1rem">Quick actions</p>
    <div style="display:flex;flex-wrap:wrap;gap:10px">
      <a href="/add_expense" class="btn btn-primary btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        Add Expense
      </a>
      <a href="/expenses" class="btn btn-ghost btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 0 2-2h2a2 2 0 0 0 2 2"/></svg>
        View Expenses
      </a>
      <a href="/settlement" class="btn btn-ghost btn-lg">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 0 0 1.946-.806 3.42 3.42 0 0 1 4.438 0 3.42 3.42 0 0 0 1.946.806 3.42 3.42 0 0 1 3.138 3.138 3.42 3.42 0 0 0 .806 1.946 3.42 3.42 0 0 1 0 4.438 3.42 3.42 0 0 0-.806 1.946 3.42 3.42 0 0 1-3.138 3.138 3.42 3.42 0 0 0-1.946.806 3.42 3.42 0 0 1-4.438 0 3.42 3.42 0 0 0-1.946-.806 3.42 3.42 0 0 1-3.138-3.138 3.42 3.42 0 0 0-.806-1.946 3.42 3.42 0 0 1 0-4.438 3.42 3.42 0 0 0 .806-1.946 3.42 3.42 0 0 1 3.138-3.138z"/></svg>
        Settlement
      </a>
    </div>
  </div>
</div>

{% endblock %}
